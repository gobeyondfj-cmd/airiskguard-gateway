<!-- Stats cards partial (included in dashboard.html and returned by HTMX refresh) -->
<div id="stats-cards" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"
     hx-get="/dashboard/stats"
     hx-trigger="every 30s"
     hx-swap="outerHTML">
    <div class="card p-5">
        <p class="text-xs mb-1" style="color:#7d8fa8">Total requests</p>
        <p class="text-3xl font-bold text-white">{{ stats.total }}</p>
    </div>
    <div class="card p-5">
        <p class="text-xs mb-1" style="color:#7d8fa8">Blocked</p>
        <p class="text-3xl font-bold text-red-400">{{ stats.blocked }}</p>
    </div>
    <div class="card p-5">
        <p class="text-xs mb-1" style="color:#7d8fa8">Redacted</p>
        <p class="text-3xl font-bold text-orange-400">{{ stats.redacted }}</p>
    </div>
    <div class="card p-5">
        <p class="text-xs mb-1" style="color:#7d8fa8">Block rate</p>
        <p class="text-3xl font-bold" style="color:#00d4ff">{{ stats.block_rate }}</p>
    </div>
</div>
