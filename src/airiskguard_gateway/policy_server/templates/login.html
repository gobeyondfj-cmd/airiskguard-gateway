<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AIRiskGuard Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Inter", system-ui, sans-serif; background: #050a14; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(0,212,255,0.15); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px; }
        .logo { display: flex; align-items: center; gap: 0.6rem; font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 2rem; }
        .logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg, #00d4ff, #7c3aed); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; box-shadow: 0 0 16px rgba(0,212,255,0.4); }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.4rem; }
        .sub { color: #7d8fa8; font-size: 0.875rem; margin-bottom: 2rem; }
        label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: #7d8fa8; margin-bottom: 0.4rem; }
        input { width: 100%; background: #020912; border: 1px solid rgba(0,212,255,0.2); border-radius: 8px; padding: 0.75rem 1rem; color: #e2e8f0; font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.2s; margin-bottom: 1.25rem; }
        input:focus { border-color: rgba(0,212,255,0.5); }
        button { width: 100%; background: #00d4ff; color: #050a14; border: none; border-radius: 8px; padding: 0.875rem; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 0 20px rgba(0,212,255,0.3); transition: box-shadow 0.2s; }
        button:hover { box-shadow: 0 0 32px rgba(0,212,255,0.5); }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: 6px; padding: 0.75rem 1rem; color: #f87171; font-size: 0.85rem; margin-bottom: 1.25rem; }
        .hint { margin-top: 1.25rem; text-align: center; font-size: 0.78rem; color: #4a5568; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">◆</div>
        AIRiskGuard
    </div>
    <h1>Admin Login</h1>
    <p class="sub">Sign in to manage your gateway policies and view analytics.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next }}">
        <div>
            <label>Username</label>
            <input type="text" name="username" autofocus autocomplete="username" placeholder="admin">
        </div>
        <div>
            <label>Password</label>
            <input type="password" name="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit">Sign In</button>
    </form>
    <p class="hint">Set AIRISKGUARD_ADMIN_PASS env var to configure password.</p>
</div>
</body>
</html>
